
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>NimbusCalc</title>
  <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
  <h2 style="margin-top: 0;">NimbusCalc</h2>
  <div id="history" class="history"></div>
  <div id="input-container"></div>
  <div class="controls">
    <label><input type="checkbox" id="multi-line-toggle"> Multi-line</label>
    <button id="clear-all">Clear All</button>
  </div>
  <br/>
  <details>
    <summary> Settings </summary>
    Font size: <button id="increase-font-size"> + </button> <button id="decrease-font-size"> - </button>
  </details>
  <script src="../scripts/math.min.js"></script>
  <script src="../scripts/popup.js"></script>
</body>
</html>
